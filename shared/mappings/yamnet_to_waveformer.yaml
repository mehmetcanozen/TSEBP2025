# YAMNet to Waveformer Target Mapping
# Maps semantic categories from YAMNet detection to Waveformer separation targets
# NOTE: yamnet_indices are for reference. The current pipeline sources indices from 
# training/configs/yamnet_class_map.yaml.

categories:
  # ALERT SOUNDS (suppressible like any other category)
  siren:
    waveformer_targets: []
    yamnet_indices: [388, 389, 390]  # Siren, Ambulance, Police car
    priority: "medium"
  
  alarm:
    waveformer_targets: []
    yamnet_indices: [387, 388, 403]  # Fire alarm, Smoke detector, Alarm
    priority: "medium"

  # SPEECH (Medium Priority)
  speech:
    waveformer_targets: []  # Speech is the target to KEEP, not suppress
    yamnet_indices: [0, 1, 2, 3, 4, 5]  # Speech, Male speech, Female speech, Child speech, Conversation, Narration
    priority: "medium"

  # TRAFFIC NOISE
  traffic:
    waveformer_targets: ["Bus"]
    yamnet_indices: [323, 324, 325, 326]  # Traffic, Car, Vehicle, Motor vehicle
    priority: "low"

  # MUSIC
  music:
    waveformer_targets: [
      "Acoustic_guitar", "Violin_or_fiddle", "Trumpet", "Saxophone", 
      "Flute", "Clarinet", "Bass_drum", "Cello", "Cowbell", "Double_bass", 
      "Electric_piano", "Glockenspiel", "Gong", "Harmonica", "Hi-hat", 
      "Snare_drum", "Tambourine"
    ]
    yamnet_indices: [132, 133, 134, 135, 137, 138, 139, 140, 148, 149, 156, 157, 159, 160, 163, 166, 167, 169, 172, 176, 182, 184, 186, 188, 189, 190, 191, 192, 193]  
    priority: "medium"

  # WIND / MICROPHONE NOISE
  wind:
    waveformer_targets: []  # No direct Waveformer target, use spectral gating instead
    yamnet_indices: [486, 487]  # Wind, Wind noise
    priority: "low"
    processing_method: "spectral_gate"  # Use traditional DSP for this

  # TYPING / KEYBOARD
  typing:
    waveformer_targets: ["Computer_keyboard", "Writing"]
    yamnet_indices: [378, 380]  # Typing, Computer keyboard (CORRECT INDICES!)
    priority: "low"
    detection_threshold: 0.03  # Keyboard is quiet, lower threshold to 3%

  # NATURE SOUNDS
  nature:
    waveformer_targets: []
    yamnet_indices: [277, 280, 281, 282, 283, 284, 285]  # Wind, Thunderstorm, Water, Rain
    priority: "low"

  # PETS / ANIMALS
  pets:
    waveformer_targets: ["Bark", "Meow"]
    yamnet_indices: [67, 68, 69, 70, 71, 72, 73, 74, 75, 76, 77, 78, 79, 80]  # Domestic animals, Dog, Bark, Cat, Meow, Purr
    priority: "low"
    transient: true  # Sharp impulsive sounds — use shorter STFT window

  # PHONE / NOTIFICATIONS
  phone:
    waveformer_targets: ["Telephone"]
    yamnet_indices: [383, 384, 385, 386, 387, 388]  # Telephone, Ringtone, Dial tone
    priority: "medium"
    detection_threshold: 0.1

  # ALERTS / CHIMES
  chimes:
    waveformer_targets: ["Chime"]
    yamnet_indices: [195, 196, 197, 198, 200, 201, 202]  # Bell, Church bell, Chime
    priority: "low"

  # EXPLOSIONS / WEAPONS
  explosions:
    waveformer_targets: ["Gunshot_or_gunfire", "Fireworks"]
    yamnet_indices: [420, 421, 422, 423, 424, 425, 426, 427, 430]  # Explosion, Gunshot, Fireworks, Boom
    priority: "low"
    transient: true  # Sharp impulsive sounds — use shorter STFT window

  # GLASS / IMPACT
  glass_impact:
    waveformer_targets: ["Shatter"]
    yamnet_indices: [435, 436, 437, 463, 464]  # Glass, Shatter, Smash
    priority: "low"
    transient: true  # Sharp impulsive sounds — use shorter STFT window

  # BODILY FUNCTIONS
  bodily_functions:
    waveformer_targets: ["Fart", "Burping_or_eructation"]
    yamnet_indices: [52, 53, 54, 55]  # Stomach rumble, Burping, Hiccup, Fart
    priority: "low"

  # APPLIANCES
  appliances:
    waveformer_targets: ["Microwave_oven"]
    yamnet_indices: [362, 363, 371, 367]  # Microwave oven, Blender, Vacuum, Dryer
    priority: "low"

  misc:
    waveformer_targets: [
      "Applause",
      "Cough",
      "Knock",
      "Laughter",
      "Finger_snapping",
      "Drawer_open_or_close",
      "Keys_jangling",
      "Scissors",
      "Squeak",
      "Tearing"
    ]
    yamnet_indices: [62, 42, 353, 13, 14, 44, 57, 357, 373, 375, 355, 474]  # Applause, Cough, Knock, Laughter, etc.
    priority: "low"

# Notes:
# - Empty waveformer_targets means we don't have a direct Waveformer separation target
# - Some categories like "wind" need traditional DSP (spectral gating) since Waveformer doesn't have that target
# - All categories including siren/alarm are user-controllable suppression targets
