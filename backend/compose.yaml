services:
  postgres:
    image: postgres:18
    profiles: ["db", "all"]
    environment:
      POSTGRES_DB: tsebp2025
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - tsebp2025-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tsebp2025"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    profiles: ["api", "all"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/tsebp2025?schema=public"
    ports:
      - "4000:4000"

volumes:
  tsebp2025-postgres:
