# Runtime Category to CodecSep Prompt/Slot Mapping
#
# Runtime mapping for CodecSep.
#
# This file now exists only for legacy prompt compatibility:
# - V5 fixed-category runtime uses `product_to_hive_fixedset.json` plus the
#   fixed-category identity catalog
# - fixed slots remain `speech`, `music`, `sfx` only for legacy prompt modes
# - nuisance/environmental suppression targets the `sfx` slot in those legacy paths
# - `queries` defines the prompt profile for the chosen fixed slot
# - `stems` and `prompts` remain compatibility fallbacks
#
# Experimental search mode can still read the richer `queries` fields
# such as `negative_prompts`, `preserve_prompts`, and `alternate_slots`,
# but the V5 default runtime does not depend on them.

stems:
  speech: ["speech"]
  music: ["music"]
  typing: ["sfx"]
  pets: ["sfx"]
  traffic: ["sfx"]
  phone: ["sfx"]
  chimes: ["music"]
  explosions: ["sfx"]
  glass_impact: ["sfx"]
  bodily_functions: ["sfx"]
  appliances: ["sfx"]
  misc: ["sfx"]
  nature: ["sfx"]
  wind: ["sfx"]
  siren: ["sfx"]
  alarm: ["sfx"]

prompts:
  speech: "speech, talking, voice"
  music: "music, musical instruments"
  typing: "keyboard typing sounds, key clicks from a computer keyboard"
  pets: "a dog barking, an animal sound"
  traffic: "traffic noise, a car passing, engine rumble, road ambience"
  phone: "a telephone ringing, a phone notification, an alert tone"
  chimes: "bell chimes, ringing bells, bell tones"
  explosions: "an explosion, fireworks, a gunshot, a loud blast"
  glass_impact: "glass breaking, glass shattering, impact sounds"
  bodily_functions: "coughing, sneezing, throat clearing, burping"
  appliances: "a microwave beep, a household appliance, a kitchen machine"
  misc: "knocking, clapping, an object drop, everyday sounds"
  nature: "rain, thunder, water flow, natural ambience"
  wind: "gusting wind noise, blowing air outdoors"
  siren: "an ambulance siren, an emergency vehicle siren"
  alarm: "a fire alarm, a smoke alarm, warning beeps"

queries:
  speech:
    positive_prompts: ["speech, talking, voice"]
    preserve_prompts: ["music, musical instruments", "sound effects, environmental sounds, noise"]
    preferred_slot: "speech"
    alternate_slots: ["sfx"]
    reconstruction_policy: "keep_complement"
    default_aggressiveness: 1.2
    use_multistep: false
  music:
    positive_prompts: ["music, musical instruments"]
    preserve_prompts: ["speech, talking, voice", "sound effects, environmental sounds, noise"]
    preferred_slot: "music"
    alternate_slots: ["sfx"]
    reconstruction_policy: "keep_complement"
    default_aggressiveness: 1.2
    use_multistep: false
  typing:
    positive_prompts:
      - "keyboard typing sounds, key clicks"
      - "mechanical keyboard typing, keystroke sounds"
      - "computer keyboard input, typing noise"
    negative_prompts: ["speech, talking, voice", "music, musical instruments"]
    preserve_prompts: ["speech, talking, voice", "music, musical instruments"]
    preferred_slot: "sfx"
    alternate_slots: ["speech", "music"]
    reconstruction_policy: "wiener_mask"
    default_aggressiveness: 2.2
    use_multistep: true
  pets:
    positive_prompts:
      - "a dog barking loudly"
      - "a dog barking in the distance"
      - "canine vocalization, an animal sound"
    negative_prompts: ["speech, talking, voice", "music, musical instruments"]
    preserve_prompts: ["speech, talking, voice", "music, musical instruments"]
    preferred_slot: "sfx"
    alternate_slots: ["speech", "music"]
