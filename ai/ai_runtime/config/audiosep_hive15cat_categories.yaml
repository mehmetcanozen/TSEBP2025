# Exact-15 category surface for the AudioSepHive15Cat ONNX backend.
#
# These labels intentionally stay separate from the legacy Waveformer/CodecSep
# category surface. Detection is manual-first for this backend, so all runtime
# thresholds default to -1 (always suppress when explicitly selected).

categories:
  speech:
    audiosep15_targets: ["speech"]
    detection_threshold: -1
    aggressiveness_override: 1.4

  music:
    audiosep15_targets: ["music"]
    detection_threshold: -1
    aggressiveness_override: 1.5

  dog barking:
    audiosep15_targets: ["dog barking"]
    detection_threshold: -1
    aggressiveness_override: 1.9

  car engine:
    audiosep15_targets: ["car engine"]
    detection_threshold: -1
    aggressiveness_override: 1.8

  footsteps:
    audiosep15_targets: ["footsteps"]
    detection_threshold: -1
    aggressiveness_override: 1.5

  rain:
    audiosep15_targets: ["rain"]
    detection_threshold: -1
    aggressiveness_override: 1.3

  wind:
    audiosep15_targets: ["wind"]
    detection_threshold: -1
    aggressiveness_override: 1.6

  keyboard typing:
    audiosep15_targets: ["keyboard typing"]
    detection_threshold: -1
    transient: true
    aggressiveness_override: 2.2

  phone ringing:
    audiosep15_targets: ["phone ringing"]
    detection_threshold: -1
    aggressiveness_override: 2.0

  crowd noise:
    audiosep15_targets: ["crowd noise"]
    detection_threshold: -1
    aggressiveness_override: 1.5

  bird singing:
    audiosep15_targets: ["bird singing"]
    detection_threshold: -1
    aggressiveness_override: 1.5

  water flowing:
    audiosep15_targets: ["water flowing"]
    detection_threshold: -1
    aggressiveness_override: 1.4

  door knocking:
    audiosep15_targets: ["door knocking"]
    detection_threshold: -1
    transient: true
    aggressiveness_override: 2.0

  alarm:
    audiosep15_targets: ["alarm"]
    detection_threshold: -1
    transient: true
    aggressiveness_override: 2.3

  background noise:
    audiosep15_targets: ["background noise"]
    detection_threshold: -1
    aggressiveness_override: 1.2
